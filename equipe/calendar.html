<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#0f2c52">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GCBTP Équipe">
<title>Avancement — Espace équipe GCBTP</title>
<link rel="icon" href="../favicon.ico">
<link rel="apple-touch-icon" href="../Images/LOGO-1.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/equipe.css?v=32">
</head>
<body class="app-body">

<header class="app-header">
  <a href="../index.html" class="brand">
    <img src="../Images/LOGO-1.png" alt="GCBTP">
    <span>Espace équipe</span>
  </a>
  <nav class="app-nav">
    <a href="dashboard.html" class="nav-pill">Tâches</a>
    <a href="calendar.html" class="nav-pill nav-pill-active"><i data-lucide="bar-chart-3"></i> Avancement</a>
    <a href="chat.html" class="nav-pill">Chat</a>
    <a href="files.html" class="nav-pill">Fichiers</a>
    <a href="profil.html" class="nav-pill">Mon profil</a>
  </nav>
  <div class="app-user">
    <a id="headerAvatar" class="header-avatar" href="profil.html" title="Mon profil"></a>
    <span id="userName">…</span>
    <button data-install-app class="btn-ghost btn-install" hidden title="Installer l'app"><i data-lucide="download"></i> Installer</button>
    <button id="logoutBtn" class="btn-ghost">Déconnexion</button>
  </div>
</header>

<main class="progress-main">

  <div class="progress-toolbar">
    <select id="progressFilter" class="select">
      <option value="all">Tous les chantiers</option>
      <option value="active">Avec tâches en cours</option>
      <option value="late">Avec tâches en retard</option>
    </select>
    <select id="progressMember" class="select">
      <option value="all">Toute l'équipe</option>
    </select>
    <div style="flex:1"></div>
    <span id="progressUpdated" class="form-hint"></span>
  </div>

  <div id="progressList" class="progress-list">
    <p class="empty">Chargement…</p>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="js/supabase.js?v=24"></script>
<script src="js/auth.js?v=26"></script>
<script src="js/pwa.js?v=19"></script>
<script src="js/calendar.js?v=20"></script>
</body>
</html>
