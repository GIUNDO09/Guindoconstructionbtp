<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#e87722">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GCBTP Équipe">
<title>Calendrier — Espace équipe GCBTP</title>
<link rel="icon" href="../favicon.ico">
<link rel="apple-touch-icon" href="../Images/LOGO-1.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/equipe.css?v=19">
</head>
<body class="app-body">

<header class="app-header">
  <a href="../index.html" class="brand">
    <img src="../Images/LOGO-1.png" alt="GCBTP">
    <span>Espace équipe</span>
  </a>
  <nav class="app-nav">
    <a href="dashboard.html" class="nav-pill">Tâches</a>
    <a href="calendar.html" class="nav-pill nav-pill-active">📅 Calendrier</a>
    <a href="chat.html" class="nav-pill">Chat</a>
    <a href="files.html" class="nav-pill">Fichiers</a>
    <a href="profil.html" class="nav-pill">Mon profil</a>
  </nav>
  <div class="app-user">
    <span id="userName">…</span>
    <button data-install-app class="btn-ghost btn-install" hidden title="Installer l'app">📥 Installer</button>
    <button id="logoutBtn" class="btn-ghost">Déconnexion</button>
  </div>
</header>

<main class="cal-main">

  <section class="panel">
    <div class="cal-toolbar">
      <button type="button" id="calPrev" class="btn-ghost" aria-label="Mois précédent">‹</button>
      <h2 id="calTitle" class="cal-title">…</h2>
      <button type="button" id="calNext" class="btn-ghost" aria-label="Mois suivant">›</button>
      <button type="button" id="calToday" class="btn-ghost">Aujourd'hui</button>
      <select id="calFilter" class="select">
        <option value="all">Toutes les tâches</option>
        <option value="me">Mes tâches</option>
      </select>
    </div>

    <div class="cal-weekdays">
      <span>Lun</span><span>Mar</span><span>Mer</span><span>Jeu</span><span>Ven</span><span>Sam</span><span>Dim</span>
    </div>
    <div id="calGrid" class="cal-grid"></div>

    <div class="cal-legend">
      <span class="cal-legend-item"><span class="dot dot-todo"></span> À faire</span>
      <span class="cal-legend-item"><span class="dot dot-progress"></span> En cours</span>
      <span class="cal-legend-item"><span class="dot dot-done"></span> Terminé</span>
      <span class="cal-legend-item"><span class="dot dot-overdue"></span> En retard</span>
    </div>
  </section>

  <section class="panel" id="dayPanel" hidden>
    <h3 id="dayTitle">…</h3>
    <div id="dayTasks" class="cal-day-tasks"></div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js?v=19"></script>
<script src="js/auth.js?v=19"></script>
<script src="js/pwa.js?v=19"></script>
<script src="js/calendar.js?v=19"></script>
</body>
</html>
