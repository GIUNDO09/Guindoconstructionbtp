<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#e87722">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GCBTP Équipe">
<title>Dashboard — Espace équipe GCBTP</title>
<link rel="icon" href="../favicon.ico">
<link rel="apple-touch-icon" href="../Images/LOGO-1.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/equipe.css?v=18">
</head>
<body class="app-body">

<script>
/* Tripwire anti-cache : ferme les modales coûte que coûte, même si le reste du JS ne s'est pas chargé */
window.__hideModal = function(id) {
  var m = document.getElementById(id);
  if (!m) return;
  m.style.display = 'none';
  m.setAttribute('hidden', '');
};
</script>

<header class="app-header">
  <a href="../index.html" class="brand">
    <img src="../Images/LOGO-1.png" alt="GCBTP">
    <span>Espace équipe</span>
  </a>
  <nav class="app-nav">
    <a href="dashboard.html" class="nav-pill nav-pill-active">Tâches</a>
    <a href="chat.html" class="nav-pill">Chat</a>
    <a href="files.html" class="nav-pill">Fichiers</a>
    <a href="profil.html" class="nav-pill">Mon profil</a>
  </nav>
  <div class="app-user">
    <span id="userName">…</span>
    <button data-install-app class="btn-ghost btn-install" hidden title="Installer l'app">📥 Installer</button>
    <button id="logoutBtn" class="btn-ghost">Déconnexion</button>
  </div>
</header>

<main class="app-main">

  <section class="stats">
    <div class="stat-card">
      <span class="stat-label">Total</span>
      <span class="stat-value" id="statTotal">0</span>
    </div>
    <div class="stat-card stat-todo">
      <span class="stat-label">À faire</span>
      <span class="stat-value" id="statTodo">0</span>
    </div>
    <div class="stat-card stat-progress">
      <span class="stat-label">En cours</span>
      <span class="stat-value" id="statProg">0</span>
    </div>
    <div class="stat-card stat-done">
      <span class="stat-label">Terminées</span>
      <span class="stat-value" id="statDone">0</span>
    </div>
  </section>

  <section class="panel">
    <h2>Progression de l'équipe</h2>
    <div id="teamProgress" class="team-progress"></div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h2>Tâches</h2>
      <div class="toolbar">
        <input type="search" id="searchTasks" class="search-input" placeholder="🔍 Rechercher (titre, projet, description)…" autocomplete="off">
        <select id="filterAssignee" class="select">
          <option value="all">Tous les membres</option>
        </select>
        <select id="filterStatus" class="select">
          <option value="all">Tous les statuts</option>
          <option value="todo">À faire</option>
          <option value="in_progress">En cours</option>
          <option value="done">Terminées</option>
        </select>
        <select id="sortTasks" class="select">
          <option value="due">Trier : échéance</option>
          <option value="priority">Trier : priorité</option>
          <option value="created">Trier : date de création</option>
          <option value="title">Trier : titre A-Z</option>
        </select>
        <button id="newTaskBtn" class="btn-primary" hidden>+ Nouvelle tâche</button>
      </div>
    </div>
    <div id="tasksList" class="tasks-list"></div>
  </section>

</main>

<!-- Modal détail tâche + commentaires -->
<div id="taskDetailModal" class="modal" hidden>
  <div class="modal-content modal-wide">
    <button class="modal-close" id="detailClose" aria-label="Fermer" onclick="window.__hideModal('taskDetailModal')">×</button>
    <div id="taskDetailHead"></div>
    <section class="comments-section">
      <h4>💬 Discussion</h4>
      <div id="commentsList" class="comments-list"></div>
      <form id="commentForm" class="comment-form" action="javascript:void(0);">
        <textarea id="commentInput" rows="2" maxlength="2000" placeholder="Ajouter un commentaire…" required></textarea>
        <button type="submit" class="btn-primary">Publier</button>
      </form>
    </section>
  </div>
</div>

<!-- Modal nouvelle/édition tâche -->
<div id="taskModal" class="modal" hidden>
  <div class="modal-content">
    <h3 id="modalTitle">Nouvelle tâche</h3>
    <form id="taskForm" class="task-form" action="javascript:void(0);" novalidate>
      <label>
        <span>Titre *</span>
        <input name="title" type="text" required maxlength="200">
      </label>
      <label>
        <span>Description</span>
        <textarea name="description" rows="3"></textarea>
      </label>
      <div class="form-row">
        <label>
          <span>Chantier / Projet</span>
          <input name="project" type="text" placeholder="Ex: Hôtel Wassado">
        </label>
        <label>
          <span>Échéance</span>
          <input name="due_date" type="date">
        </label>
      </div>
      <label>
        <span>Dossier du projet (fichiers liés)</span>
        <select name="folder_id">
          <option value="">— Aucun —</option>
        </select>
      </label>
      <label>
        <span>Image de couverture</span>
        <input name="cover_file" type="file" accept="image/*">
        <small class="form-hint" id="coverHint"></small>
      </label>
      <label>
        <span>Assignées à (plusieurs possibles)</span>
        <div id="assigneeList" class="checkbox-list"></div>
      </label>
      <div class="form-row">
        <label>
          <span>Priorité</span>
          <select name="priority">
            <option value="low">Basse</option>
            <option value="medium" selected>Moyenne</option>
            <option value="high">Haute</option>
          </select>
        </label>
        <label>
          <span>Statut</span>
          <select name="status">
            <option value="todo">À faire</option>
            <option value="in_progress">En cours</option>
            <option value="done">Terminée</option>
          </select>
        </label>
      </div>
      <div class="modal-actions">
        <button type="button" id="modalCancel" class="btn-ghost" onclick="window.__hideModal('taskModal')">Annuler</button>
        <button type="submit" class="btn-primary">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js?v=18"></script>
<script src="js/auth.js?v=18"></script>
<script src="js/pwa.js?v=18"></script>
<script src="js/dashboard.js?v=18"></script>
</body>
</html>
