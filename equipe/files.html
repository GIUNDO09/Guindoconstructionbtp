<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#e87722">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GCBTP Équipe">
<title>Fichiers — Espace équipe GCBTP</title>
<link rel="icon" href="../favicon.ico">
<link rel="apple-touch-icon" href="../Images/LOGO-1.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/equipe.css?v=22">
</head>
<body class="app-body">

<header class="app-header">
  <a href="../index.html" class="brand">
    <img src="../Images/LOGO-1.png" alt="GCBTP">
    <span>Espace équipe</span>
  </a>
  <nav class="app-nav">
    <a href="dashboard.html" class="nav-pill">Tâches</a>
    <a href="calendar.html" class="nav-pill">📅 Calendrier</a>
    <a href="chat.html" class="nav-pill">Chat</a>
    <a href="files.html" class="nav-pill nav-pill-active">Fichiers</a>
    <a href="profil.html" class="nav-pill">Mon profil</a>
  </nav>
  <div class="app-user">
    <span id="userName">…</span>
    <button data-install-app class="btn-ghost btn-install" hidden title="Installer l'app">📥 Installer</button>
    <button id="logoutBtn" class="btn-ghost">Déconnexion</button>
  </div>
</header>

<main class="files-main">

  <div class="files-toolbar">
    <span id="serverStatus" class="server-status">🔴 Serveur non configuré</span>
    <div style="flex:1"></div>
    <button id="reorganizeBtn" class="btn-ghost" hidden title="Range les médias chat/avatars/couvertures dans leurs sous-dossiers">📦 Réorganiser</button>
    <button id="cleanupOrphansBtn" class="btn-ghost" hidden title="Supprime les entrées DB sans fichier sur le disque">🧹 Orphelins</button>
    <button id="configServerBtn" class="btn-ghost" hidden>⚙️ Config serveur</button>
    <button id="newRootFolderBtn" class="btn-primary" hidden>+ Nouveau dossier</button>
  </div>

  <div class="files-layout">

    <aside class="files-sidebar">
      <h3>Arborescence</h3>
      <div id="folderTree" class="folder-tree"></div>
    </aside>

    <section class="files-content">
      <div class="folder-head">
        <nav id="breadcrumb" class="breadcrumb"></nav>
        <h2 id="currentFolderTitle">Racine</h2>
        <div id="folderActions" class="folder-actions" hidden>
          <label>
            Statut :
            <select id="folderStatus" class="select">
              <option value="todo">À faire</option>
              <option value="in_progress">En cours</option>
              <option value="done">Terminé</option>
            </select>
          </label>
          <button id="newSubFolderBtn" class="btn-ghost">+ Sous-dossier</button>
        </div>
      </div>

      <div class="files-controls">
        <input type="search" id="searchFiles" class="search-input" placeholder="🔍 Rechercher dans le dossier…" autocomplete="off">
        <select id="sortFiles" class="select">
          <option value="recent">Trier : récents</option>
          <option value="name">Trier : nom A-Z</option>
          <option value="size">Trier : taille</option>
        </select>
      </div>

      <div id="dropzone" class="dropzone">
        <div class="dropzone-inner">
          <div class="dropzone-icon">📤</div>
          <p>Glisse <strong>fichiers ou dossiers</strong> ici, ou choisis ci-dessous :</p>
          <div class="dropzone-actions">
            <button type="button" id="pickFilesBtn" class="btn-ghost">📄 Choisir des fichiers</button>
            <button type="button" id="pickFolderBtn" class="btn-ghost">📂 Importer un dossier</button>
          </div>
        </div>
        <input type="file" id="fileInput" multiple hidden>
        <input type="file" id="folderInput" webkitdirectory directory multiple hidden>
      </div>

      <div id="uploadProgress" class="upload-progress" hidden></div>

      <div id="folderContent" class="folder-content"></div>
    </section>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js?v=24"></script>
<script src="js/auth.js?v=24"></script>
<script src="js/pwa.js?v=22"></script>
<script src="js/files.js?v=25"></script>
</body>
</html>
