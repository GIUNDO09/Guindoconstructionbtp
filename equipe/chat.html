<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#0f2c52">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GCBTP Équipe">
<title>Chat équipe — GCBTP</title>
<link rel="icon" href="../favicon.ico">
<link rel="apple-touch-icon" href="../Images/LOGO-1.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://aqbtphtqurkunfawnvvg.supabase.co" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="preconnect" href="https://gcbtp.whereby.com" crossorigin>
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="css/equipe.css?v=40">
</head>
<body class="app-body">

<header class="app-header">
  <a href="../index.html" class="brand">
    <img src="../Images/LOGO-1.png" alt="GCBTP">
    <span>Espace équipe</span>
  </a>
  <nav class="app-nav">
    <a href="dashboard.html" class="nav-pill">Tâches</a>
    <a href="projects.html" class="nav-pill"><i data-lucide="hard-hat"></i> Projets</a>
    <a href="chat.html" class="nav-pill nav-pill-active">Chat</a>
    <a href="files.html" class="nav-pill">Fichiers</a>
    <a href="profil.html" class="nav-pill">Mon profil</a>
  </nav>
  <div class="app-user">
    <a id="headerAvatar" class="header-avatar" href="profil.html" title="Mon profil"></a>
    <span id="userName">…</span>
    <button data-install-app class="btn-ghost btn-install" hidden title="Installer l'app"><i data-lucide="download"></i> Installer</button>
    <button id="logoutBtn" class="btn-ghost">Déconnexion</button>
  </div>
</header>

<main class="chat-main" id="chatMain">

  <aside class="conv-sidebar" id="convSidebar">
    <div class="conv-sidebar-head">
      <h3>Conversations</h3>
      <button type="button" id="newConvBtn" class="btn-ghost" title="Nouvelle conversation privée"><i data-lucide="plus"></i></button>
    </div>
    <div id="convList" class="conv-list">
      <button type="button" class="conv-item conv-item-active" data-conv-id="">
        <div class="conv-avatar conv-avatar-channel"><i data-lucide="hash"></i></div>
        <div class="conv-body">
          <div class="conv-name">Canal général</div>
          <div class="conv-sub">Toute l'équipe</div>
        </div>
      </button>
    </div>
  </aside>

  <section class="chat-panel">
    <div class="chat-header">
      <div class="chat-header-row">
        <button type="button" id="convBackBtn" class="btn-icon-bubble conv-back-btn" title="Conversations"><i data-lucide="menu"></i></button>
        <div>
          <h2 id="chatTitle"><i data-lucide="hash"></i> Canal général</h2>
          <p class="chat-sub">
            <span id="onlineIndicator" class="online-indicator" title="Personnes connectées">
              <span class="online-dot"></span>
              <span id="onlineCount">…</span> en ligne
            </span>
            <span class="chat-sub-sep">·</span>
            <span id="chatSubText">Discussion en temps réel avec toute l'équipe</span>
          </p>
        </div>
        <button type="button" id="startCallBtn" class="btn-icon-bubble" title="Démarrer un appel vocal"><i data-lucide="phone"></i></button>
        <button type="button" id="startVisioBtn" class="btn-icon-bubble" title="Démarrer une visio"><i data-lucide="video"></i></button>
        <button type="button" id="searchToggleBtn" class="btn-icon-bubble" title="Rechercher"><i data-lucide="search"></i></button>
      </div>
      <div id="searchBar" class="search-bar" hidden>
        <input type="search" id="searchInput" placeholder="Rechercher dans les messages…" autocomplete="off">
        <span id="searchCount" class="search-count"></span>
        <button type="button" id="searchClose" class="btn-inline" aria-label="Fermer la recherche"><i data-lucide="x"></i></button>
      </div>
    </div>

    <!-- Barre des messages épinglés (max 3 par conversation) -->
    <div id="pinnedBar" class="pinned-bar" hidden>
      <div class="pinned-bar-head">
        <span class="pinned-bar-title"><i data-lucide="pin"></i> <span id="pinnedCount">0</span> épinglé(s)</span>
        <button type="button" id="pinnedToggle" class="btn-inline pinned-toggle" title="Réduire/Déplier" aria-expanded="true"><i data-lucide="chevron-down"></i></button>
      </div>
      <div id="pinnedList" class="pinned-list"></div>
    </div>

    <div id="messagesList" class="messages-list"></div>

    <!-- Indicateur "X est en train d'écrire…" -->
    <div id="typingIndicator" class="typing-indicator" hidden>
      <span class="typing-dots"><span></span><span></span><span></span></span>
      <span id="typingText"></span>
    </div>

    <!-- Aperçu de la citation (réponse) -->
    <div id="replyPreview" class="reply-preview" hidden>
      <span class="reply-bar"></span>
      <div class="reply-info">
        <span class="reply-author" id="replyAuthor"></span>
        <span class="reply-text" id="replyText"></span>
      </div>
      <button type="button" id="cancelReply" class="btn-inline" title="Annuler la réponse"><i data-lucide="x"></i></button>
    </div>

    <!-- Aperçu du fichier sélectionné avant envoi -->
    <div id="attachmentPreview" class="attachment-preview" hidden>
      <span id="attachmentName" class="attachment-name"></span>
      <button type="button" id="cancelAttachment" class="btn-ghost" title="Retirer"><i data-lucide="x"></i></button>
    </div>

    <!-- État d'enregistrement vocal -->
    <div id="recordingBar" class="recording-bar" hidden>
      <span class="rec-dot"></span>
      <span>Enregistrement…</span>
      <span id="recDuration" class="rec-duration">00:00</span>
      <button type="button" id="recCancel" class="btn-ghost">Annuler</button>
      <button type="button" id="recStop" class="btn-primary">Envoyer</button>
    </div>

    <form id="chatForm" class="chat-form" action="javascript:void(0);">
      <button type="button" id="enableNotifBtn" class="btn-icon-bubble" hidden title="Activer les notifications"><i data-lucide="bell"></i></button>
      <div class="chat-input-wrap">
        <button type="button" id="attachBtn" class="btn-inline" title="Joindre image/vidéo/audio"><i data-lucide="paperclip"></i></button>
        <input type="file" id="attachInput" accept="image/*,video/*,audio/*,application/pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.zip" hidden>
        <button type="button" id="cameraBtn" class="btn-inline btn-camera" title="Prendre une photo"><i data-lucide="camera"></i></button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
        <textarea id="chatInput" placeholder="Écris un message…" rows="1" maxlength="2000"></textarea>
        <button type="button" id="recBtn" class="btn-inline" title="Message vocal"><i data-lucide="mic"></i></button>
      </div>
      <button type="submit" class="btn-send" aria-label="Envoyer"><i data-lucide="send"></i></button>
    </form>
  </section>

</main>

<!-- Picker d'emoji pour réactions (popup contextuelle) -->
<div id="reactionPicker" class="reaction-picker" hidden>
  <button type="button" data-emoji="👍">👍</button>
  <button type="button" data-emoji="❤️">❤️</button>
  <button type="button" data-emoji="😂">😂</button>
  <button type="button" data-emoji="😮">😮</button>
  <button type="button" data-emoji="😢">😢</button>
  <button type="button" data-emoji="🙏">🙏</button>
  <button type="button" data-emoji="🔥">🔥</button>
</div>

<!-- Picker de mentions (autocomplete @) -->
<div id="mentionPicker" class="mention-picker" hidden></div>

<!-- Modal "Nouvelle conversation privée" -->
<div id="newConvModal" class="modal" hidden role="dialog" aria-modal="true" aria-label="Nouvelle conversation">
  <div class="modal-content">
    <button type="button" class="modal-close" id="newConvClose" aria-label="Fermer"><i data-lucide="x"></i></button>
    <h3>Nouvelle conversation privée</h3>
    <p class="form-hint">Choisis un membre de l'équipe pour commencer une discussion privée.</p>
    <input type="search" id="newConvSearch" class="search-input" placeholder="Rechercher un membre…" autocomplete="off">
    <div id="newConvMembers" class="new-conv-members"></div>
  </div>
</div>

<!-- Modal Visio Jitsi -->
<div id="jitsiModal" class="jitsi-modal" hidden role="dialog" aria-modal="true" aria-label="Réunion en visio">
  <div class="jitsi-modal-bar">
    <span id="jitsiModalTitle" class="jitsi-modal-title"><i data-lucide="video"></i> Réunion</span>
    <button type="button" id="jitsiCloseBtn" class="btn-ghost"><i data-lucide="x"></i> Quitter</button>
  </div>
  <div id="jitsiFrameContainer" class="jitsi-modal-frame"></div>
</div>

<!-- Visionneuse plein écran (image) -->
<div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="Image en plein écran">
  <div class="lightbox-toolbar">
    <a class="lightbox-download" href="#" download="image" title="Télécharger" aria-label="Télécharger">⬇</a>
    <button type="button" class="lightbox-close" aria-label="Fermer">✕</button>
  </div>
  <img class="lightbox-img" alt="">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="js/supabase.js?v=24"></script>
<script src="js/auth.js?v=26"></script>
<script src="js/pwa.js?v=11"></script>
<script src="js/push.js?v=23"></script>
<script src="js/chat.js?v=35"></script>
</body>
</html>
