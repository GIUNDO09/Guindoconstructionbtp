<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#e87722">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GCBTP Équipe">
<title>Chat équipe — GCBTP</title>
<link rel="icon" href="../favicon.ico">
<link rel="apple-touch-icon" href="../Images/LOGO-1.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/equipe.css?v=11">
</head>
<body class="app-body">

<header class="app-header">
  <a href="../index.html" class="brand">
    <img src="../Images/LOGO-1.png" alt="GCBTP">
    <span>Espace équipe</span>
  </a>
  <nav class="app-nav">
    <a href="dashboard.html" class="nav-pill">Tâches</a>
    <a href="chat.html" class="nav-pill nav-pill-active">Chat</a>
    <a href="files.html" class="nav-pill">Fichiers</a>
    <a href="profil.html" class="nav-pill">Mon profil</a>
  </nav>
  <div class="app-user">
    <span id="userName">…</span>
    <button id="logoutBtn" class="btn-ghost">Déconnexion</button>
  </div>
</header>

<main class="chat-main">

  <section class="chat-panel">
    <div class="chat-header">
      <h2>💬 Canal général</h2>
      <p class="chat-sub">Discussion en temps réel avec toute l'équipe</p>
    </div>

    <div id="messagesList" class="messages-list"></div>

    <form id="chatForm" class="chat-form" action="javascript:void(0);">
      <textarea id="chatInput" placeholder="Écris un message… (Entrée pour envoyer, Maj+Entrée pour une nouvelle ligne)" rows="1" maxlength="2000" required></textarea>
      <button type="button" id="enableNotifBtn" class="btn-ghost" hidden title="Activer les notifications du navigateur">🔔</button>
      <button type="submit" class="btn-primary">Envoyer</button>
    </form>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js?v=11"></script>
<script src="js/auth.js?v=11"></script>
<script src="js/pwa.js?v=11"></script>
<script src="js/chat.js?v=11"></script>
</body>
</html>
