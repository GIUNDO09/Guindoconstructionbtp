<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#e87722">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GCBTP Équipe">
<title>Chat équipe — GCBTP</title>
<link rel="icon" href="../favicon.ico">
<link rel="apple-touch-icon" href="../Images/LOGO-1.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/equipe.css?v=12">
</head>
<body class="app-body">

<header class="app-header">
  <a href="../index.html" class="brand">
    <img src="../Images/LOGO-1.png" alt="GCBTP">
    <span>Espace équipe</span>
  </a>
  <nav class="app-nav">
    <a href="dashboard.html" class="nav-pill">Tâches</a>
    <a href="chat.html" class="nav-pill nav-pill-active">Chat</a>
    <a href="files.html" class="nav-pill">Fichiers</a>
    <a href="profil.html" class="nav-pill">Mon profil</a>
  </nav>
  <div class="app-user">
    <span id="userName">…</span>
    <button data-install-app class="btn-ghost btn-install" hidden title="Installer l'app">📥 Installer</button>
    <button id="logoutBtn" class="btn-ghost">Déconnexion</button>
  </div>
</header>

<main class="chat-main">

  <section class="chat-panel">
    <div class="chat-header">
      <h2>💬 Canal général</h2>
      <p class="chat-sub">Discussion en temps réel avec toute l'équipe</p>
    </div>

    <div id="messagesList" class="messages-list"></div>

    <!-- Aperçu du fichier sélectionné avant envoi -->
    <div id="attachmentPreview" class="attachment-preview" hidden>
      <span id="attachmentName" class="attachment-name"></span>
      <button type="button" id="cancelAttachment" class="btn-ghost" title="Retirer">✖</button>
    </div>

    <!-- État d'enregistrement vocal -->
    <div id="recordingBar" class="recording-bar" hidden>
      <span class="rec-dot"></span>
      <span>Enregistrement…</span>
      <span id="recDuration" class="rec-duration">00:00</span>
      <button type="button" id="recCancel" class="btn-ghost">Annuler</button>
      <button type="button" id="recStop" class="btn-primary">Envoyer</button>
    </div>

    <form id="chatForm" class="chat-form" action="javascript:void(0);">
      <button type="button" id="attachBtn" class="btn-icon" title="Joindre image/vidéo/audio">📎</button>
      <input type="file" id="attachInput" accept="image/*,video/*,audio/*" hidden>
      <button type="button" id="recBtn" class="btn-icon" title="Message vocal">🎤</button>
      <textarea id="chatInput" placeholder="Écris un message…" rows="1" maxlength="2000"></textarea>
      <button type="button" id="enableNotifBtn" class="btn-icon" hidden title="Activer les notifications">🔔</button>
      <button type="submit" class="btn-primary">Envoyer</button>
    </form>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js?v=11"></script>
<script src="js/auth.js?v=11"></script>
<script src="js/pwa.js?v=11"></script>
<script src="js/chat.js?v=12"></script>
</body>
</html>
